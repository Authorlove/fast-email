services:
  - type: web
    name: fast-email-api
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm run server
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 10000
    autoDeploy: true
    branch: main
    # 重要：在 Render 控制面板手动配置以下环境变量：
    # - ENCRYPTION_SECRET: 加密密钥（必填）
    # - API_KEY_HASH: API Key（推荐，用于认证）
    # - ALLOWED_ORIGINS: 允许的前端域名（推荐）
    # 详细说明请查看 SECURITY.md
